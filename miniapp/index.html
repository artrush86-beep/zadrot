<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Statham Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --accent: #f78166;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding-bottom: 80px;
    }
    /* ── HEADER ─────────────────────────────────────────────────── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { font-size: 24px; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--muted); }
    /* ── NAV ────────────────────────────────────────────────────── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; padding: 10px 4px 8px;
      background: none; border: none; color: var(--muted);
      font-size: 11px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color .15s;
    }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn.active { color: var(--blue); }
    /* ── PAGES ──────────────────────────────────────────────────── */
    .page { display: none; padding: 12px 14px; }
    .page.active { display: block; }
    /* ── CARDS ──────────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .card-title {
      font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 8px;
    }
    /* ── PRICES ─────────────────────────────────────────────────── */
    .coin-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .coin-row:last-child { border-bottom: none; }
    .coin-left { display: flex; align-items: center; gap: 10px; }
    .coin-icon { width: 36px; height: 36px; border-radius: 50%; font-size: 20px;
                 display: flex; align-items: center; justify-content: center;
                 background: var(--bg); }
    .coin-name { font-weight: 600; font-size: 15px; }
    .coin-rank { font-size: 11px; color: var(--muted); }
    .coin-right { text-align: right; }
    .coin-price { font-weight: 700; font-size: 15px; }
    .change-pos { color: var(--green); font-size: 13px; }
    .change-neg { color: var(--red); font-size: 13px; }
    /* ── F&G ────────────────────────────────────────────────────── */
    .fg-value { font-size: 48px; font-weight: 800; text-align: center; margin: 8px 0 4px; }
    .fg-label { text-align: center; font-size: 16px; margin-bottom: 12px; }
    .fg-bar-wrap { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 6px; }
    .fg-bar { height: 100%; border-radius: 5px; transition: width .6s ease; }
    .fg-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    /* ── PORTFOLIO ──────────────────────────────────────────────── */
    .port-total { font-size: 30px; font-weight: 800; text-align: center; margin: 6px 0 2px; }
    .port-change { text-align: center; font-size: 14px; margin-bottom: 12px; }
    .port-coin {
      display: flex; align-items: center; justify-content: space-between; padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .port-coin:last-child { border-bottom: none; }
    .port-coin-left { display: flex; align-items: center; gap: 9px; }
    .port-coin-amount { font-size: 12px; color: var(--muted); }
    .port-share-bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; }
    .port-share-fill { height: 4px; border-radius: 2px; background: var(--blue); }
    .add-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      background: var(--blue); border: none; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .add-btn:active { opacity: .8; }
    /* ── ALERTS ─────────────────────────────────────────────────── */
    .alert-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-dir { font-size: 18px; }
    .alert-coin { font-weight: 600; }
    .alert-target { color: var(--muted); font-size: 13px; }
    .del-btn { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; }
    /* ── CALENDAR ───────────────────────────────────────────────── */
    .event-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .event-row:last-child { border-bottom: none; }
    .event-impact { display: inline-block; padding: 2px 7px; border-radius: 4px;
                    font-size: 11px; font-weight: 600; margin-bottom: 4px; }
    .impact-high { background: rgba(248,81,73,.2); color: var(--red); }
    .impact-medium { background: rgba(210,153,34,.2); color: var(--orange); }
    .event-title { font-size: 14px; margin-bottom: 3px; }
    .event-when { font-size: 12px; color: var(--muted); }
    /* ── LOADING / EMPTY ────────────────────────────────────────── */
    .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .spinner { font-size: 28px; animation: spin 1s linear infinite; display: block; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 30px; color: var(--muted); }
    /* ── INPUT ROW ──────────────────────────────────────────────── */
    .input-row { display: flex; gap: 8px; margin-top: 10px; }
    .inp {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-size: 14px;
    }
    .inp:focus { outline: none; border-color: var(--blue); }
    .inp-btn {
      padding: 10px 14px; background: var(--blue); border: none;
      border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #238636; color: #fff; padding: 10px 18px;
      border-radius: 8px; font-size: 14px; z-index: 999;
      opacity: 0; transition: opacity .3s;
    }
    .toast.show { opacity: 1; }
    /* ── PERIOD FILTER TABS ────────────────────────────────────────── */
    .period-tabs {
      display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .period-tabs::-webkit-scrollbar { display: none; }
    .ptab {
      flex-shrink: 0; padding: 5px 12px; border-radius: 16px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; cursor: pointer;
      white-space: nowrap; transition: all .15s;
    }
    .ptab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    /* ── TOP-50 TABLE ───────────────────────────────────────────────── */
    .top50-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .top50-row:last-child { border-bottom: none; }
    .top50-rank { color: var(--muted); width: 22px; flex-shrink: 0; }
    .top50-sym { font-weight: 700; flex: 1; }
    .top50-vol { color: var(--muted); font-size: 11px; }
    .show-more-btn {
      width: 100%; padding: 10px; border-radius: 8px; margin-top: 8px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--blue); font-size: 13px; cursor: pointer;
    }
    /* ── SEARCH BAR ─────────────────────────────────────────────────── */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .search-inp {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px;
    }
    .search-inp:focus { outline: none; border-color: var(--blue); }
    /* ── CALENDAR ENHANCED ──────────────────────────────────────────── */
    .event-meta { display: flex; gap: 10px; font-size: 12px; margin-top: 4px; flex-wrap: wrap; }
    .event-val { background: var(--bg); border-radius: 4px; padding: 2px 7px; }
    .event-val span { color: var(--muted); }
    .event-actual-pos { color: var(--green); font-weight: 700; }
    .event-actual-neg { color: var(--red); font-weight: 700; }
    .event-impact-text { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
    /* ── NEWS ───────────────────────────────────────────────────────── */
    .news-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .news-row:last-child { border-bottom: none; }
    .news-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .news-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
    .news-src { background: var(--bg); border-radius: 4px; padding: 1px 6px; }
    .news-link { color: var(--blue); text-decoration: none; font-size: 12px; }
    .news-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">🤖</div>
  <div>
    <div class="header-title">Statham Bot</div>
    <div class="header-sub" id="header-sub">Загрузка...</div>
  </div>
</div>

<!-- PAGES -->

<!-- 📊 PRICES -->
<div class="page active" id="page-prices">
  <div class="card">
    <div class="card-title">📊 Крипто-цены</div>
    <div id="prices-list"><div class="loader"><span class="spinner">⏳</span>Загружаем цены...</div></div>
  </div>
  <div class="card">
    <div class="card-title">😱 Fear & Greed Index</div>
    <div id="fg-block"><div class="loader"><span class="spinner">⏳</span></div></div>
  </div>
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🏆 Топ-50 по объёму</span>
      <span id="top50-upd" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <div class="search-bar">
      <input class="search-inp" id="top50-search" placeholder="🔍 Поиск монеты..." oninput="filterTop50()">
    </div>
    <div class="period-tabs" id="top50-sort-tabs">
      <button class="ptab active" onclick="sortTop50('vol',this)">📊 Объём</button>
      <button class="ptab" onclick="sortTop50('chg_desc',this)">🟢 Рост</button>
      <button class="ptab" onclick="sortTop50('chg_asc',this)">🔴 Падение</button>
      <button class="ptab" onclick="sortTop50('price',this)">💰 Цена</button>
    </div>
    <div id="top50-list"><div class="loader"><span class="spinner">⏳</span>Загружаем топ-50...</div></div>
  </div>
</div>

<!-- 💼 PORTFOLIO -->
<div class="page" id="page-port">
  <div class="card">
    <div class="card-title">💼 Мой портфель</div>
    <div id="port-total" class="port-total">—</div>
    <div id="port-change" class="port-change"></div>
    <div id="port-list"><div class="loader"><span class="spinner">⏳</span></div></div>
  </div>
  <div class="card">
    <div class="card-title">➕ Добавить монету</div>
    <div class="input-row">
      <input class="inp" id="add-coin" placeholder="btc" style="max-width:80px">
      <input class="inp" id="add-amount" placeholder="0.5" type="number" step="any" min="0">
      <button class="inp-btn" onclick="addCoin()">OK</button>
    </div>
  </div>
</div>

<!-- 🔔 ALERTS -->
<div class="page" id="page-alerts">
  <div class="card">
    <div class="card-title">🔔 Ценовые алерты</div>
    <div id="alerts-list"><div class="loader"><span class="spinner">⏳</span></div></div>
  </div>
  <div class="card">
    <div class="card-title">➕ Новый алерт</div>
    <div class="input-row">
      <input class="inp" id="al-coin" placeholder="btc" style="max-width:60px">
      <select class="inp" id="al-dir" style="max-width:90px">
        <option value="above">📈 выше</option>
        <option value="below">📉 ниже</option>
      </select>
      <input class="inp" id="al-price" placeholder="95000" type="number" min="0">
      <button class="inp-btn" onclick="addAlert()">OK</button>
    </div>
  </div>
</div>

<!-- 📅 CALENDAR -->
<div class="page" id="page-cal">
  <div class="card">
    <div class="card-title">📅 Экономический календарь</div>
    <div class="period-tabs" id="cal-period-tabs">
      <button class="ptab active" onclick="filterCal('week',this)">📅 Эта неделя</button>
      <button class="ptab" onclick="filterCal('today',this)">🔴 Сегодня</button>
      <button class="ptab" onclick="filterCal('tomorrow',this)">🟡 Завтра</button>
      <button class="ptab" onclick="filterCal('month',this)">📆 Месяц</button>
      <button class="ptab" onclick="filterCal('all',this)">🌍 Все</button>
    </div>
    <div id="cal-list"><div class="loader"><span class="spinner">⏳</span>Загружаем события...</div></div>
  </div>
</div>

<!-- 📰 NEWS -->
<div class="page" id="page-news">
  <div class="card">
    <div class="card-title">📰 Крипто-новости</div>
    <div class="period-tabs" id="news-period-tabs">
      <button class="ptab active" onclick="filterNews('all',this)">📰 Все</button>
      <button class="ptab" onclick="filterNews('3h',this)">⚡ 3 часа</button>
      <button class="ptab" onclick="filterNews('today',this)">📅 Сегодня</button>
      <button class="ptab" onclick="filterNews('ru',this)">🇷🇺 RU</button>
      <button class="ptab" onclick="filterNews('en',this)">🇬🇧 EN</button>
    </div>
    <div id="news-list"><div class="loader"><span class="spinner">⏳</span>Загружаем новости...</div></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="nav('prices',this)">
    <span class="icon">📊</span>Цены
  </button>
  <button class="nav-btn" onclick="nav('port',this)">
    <span class="icon">💼</span>Портфель
  </button>
  <button class="nav-btn" onclick="nav('alerts',this)">
    <span class="icon">🔔</span>Алерты
  </button>
  <button class="nav-btn" onclick="nav('cal',this)">
    <span class="icon">📅</span>Макро
  </button>
  <button class="nav-btn" onclick="nav('news',this)">
    <span class="icon">📰</span>Новости
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── Telegram WebApp init ──────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.colorScheme === 'light') {
    document.documentElement.style.setProperty('--bg', '#f0f0f0');
    document.documentElement.style.setProperty('--card', '#ffffff');
    document.documentElement.style.setProperty('--text', '#000000');
    document.documentElement.style.setProperty('--border', '#e0e0e0');
    document.documentElement.style.setProperty('--muted', '#666666');
  }
}

const USER_ID  = tg?.initDataUnsafe?.user?.id || 'demo';
// Все API-запросы идут через Railway backend — обходит CORS и добавляет Binance-fallback
const API_BASE = window.location.origin;

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  btn.classList.add('active');
  if (pageId === 'prices') loadPrices();
  if (pageId === 'port')   loadPortfolio();
  if (pageId === 'alerts') loadAlerts();
  if (pageId === 'cal')    loadCalendar();
  if (pageId === 'news')   loadNews();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, color='#238636') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Форматирование ────────────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p) return '—';
  if (p >= 1000)  return '$' + p.toLocaleString('en', {maximumFractionDigits:0});
  if (p >= 1)     return '$' + p.toFixed(2);
  if (p >= 0.01)  return '$' + p.toFixed(4);
  return '$' + p.toFixed(8);
}
function fmtPct(v) {
  if (v == null) return '—';
  const cls = v >= 0 ? 'change-pos' : 'change-neg';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}
function fgColor(v) {
  if (v <= 24)  return '#f85149';
  if (v <= 44)  return '#d29922';
  if (v <= 55)  return '#8b949e';
  if (v <= 74)  return '#3fb950';
  return '#58a6ff';
}
function fgLabel(v) {
  if (v <= 24)  return '😱 Паника';
  if (v <= 44)  return '😨 Страх';
  if (v <= 55)  return '😐 Нейтрально';
  if (v <= 74)  return '😏 Жадность';
  return '🤑 Экстремальная жадность';
}

// ── Backend API helper ────────────────────────────────────────────────────────
async function backendAPI(path, opts={}) {
  try {
    const r = await fetch(API_BASE + path, opts);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.error('API error', path, e);
    return null;
  }
}

// ── PRICES (через Railway → CoinGecko + Binance fallback) ─────────────────────
const COIN_ICONS = {
  bitcoin:'₿', ethereum:'Ξ', solana:'◎', binancecoin:'⬡', 'the-open-network':'💎',
};

async function loadPrices() {
  const el = document.getElementById('prices-list');
  el.innerHTML = '<div class="loader"><span class="spinner">⏳</span>Загружаем цены...</div>';
  const data = await backendAPI('/api/prices');
  if (!data || !data.length) {
    el.innerHTML = '<div class="empty">⚠️ Не удалось загрузить цены</div>';
    loadFearGreed();
    return;
  }
  const ORDER = ['bitcoin','ethereum','solana','binancecoin','the-open-network'];
  data.sort((a,b) => ORDER.indexOf(a.id) - ORDER.indexOf(b.id));
  el.innerHTML = data.map(d => {
    const icon = COIN_ICONS[d.id] || '🪙';
    const src  = d.source === 'binance' ? ' <span style="font-size:10px;color:var(--muted)">(Binance)</span>' : '';
    return `<div class="coin-row">
      <div class="coin-left">
        <div class="coin-icon">${icon}</div>
        <div><div class="coin-name">${d.symbol}${src}</div><div class="coin-rank">#${d.rank || '?'}</div></div>
      </div>
      <div class="coin-right">
        <div class="coin-price">${fmtPrice(d.price)}</div>
        <div>${fmtPct(d.change_24h)}</div>
      </div>
    </div>`;
  }).join('');
  const btc = data.find(d => d.id === 'bitcoin');
  if (btc) document.getElementById('header-sub').textContent = 'BTC ' + fmtPrice(btc.price);
  loadFearGreed();
}

async function loadFearGreed() {
  const el = document.getElementById('fg-block');
  const d = await backendAPI('/api/fear');
  if (!d || !d.value) {
    el.innerHTML = '<div class="empty">⚠️ F&G недоступен</div>';
    return;
  }
  const v = d.value;
  const color = fgColor(v);
  const label = fgLabel(v);
  el.innerHTML = `
    <div class="fg-value" style="color:${color}">${v}</div>
    <div class="fg-label">${label}</div>
    <div class="fg-bar-wrap">
      <div class="fg-bar" style="width:${v}%;background:${color}"></div>
    </div>
    <div class="fg-range"><span>Страх 0</span><span>100 Жадность</span></div>`;
}

// ── PORTFOLIO (синхронизируется с Redis через /api/portfolio) ─────────────────
// Данные хранятся в боте — доступны и через miniapp, и через /portfolio команду
const COIN_ID_MAP = {
  btc:'bitcoin',eth:'ethereum',sol:'solana',bnb:'binancecoin',
  ton:'the-open-network',xrp:'ripple',ada:'cardano',doge:'dogecoin',
  avax:'avalanche-2',dot:'polkadot',link:'chainlink',
  shib:'shiba-inu',ltc:'litecoin',trx:'tron',near:'near',
  arb:'arbitrum',op:'optimism',sui:'sui',apt:'aptos',not:'notcoin',
};

async function loadPortfolio() {
  const el = document.getElementById('port-list');
  el.innerHTML = '<div class="loader"><span class="spinner">⏳</span>Загружаем портфель...</div>';

  // Загружаем из Redis через backend
  let port = {};
  if (USER_ID !== 'demo') {
    const data = await backendAPI('/api/portfolio?uid=' + USER_ID);
    if (data && typeof data === 'object') port = data;
  }

  // Fallback: пробуем localStorage (старые данные)
  if (!Object.keys(port).length) {
    try {
      const ls = JSON.parse(localStorage.getItem('port_' + USER_ID) || '{}');
      if (Object.keys(ls).length) {
        port = ls;
        // Мигрируем в Redis автоматически
        if (USER_ID !== 'demo') {
          for (const [coin, amt] of Object.entries(ls)) {
            await backendAPI('/api/portfolio', {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({uid:USER_ID, coin, amount:amt, action:'set'})
            });
          }
          localStorage.removeItem('port_' + USER_ID);
          toast('✅ Портфель перенесён в облако');
        }
      }
    } catch {}
  }

  const keys = Object.keys(port);
  if (!keys.length) {
    document.getElementById('port-total').textContent = '$0';
    document.getElementById('port-change').textContent = 'Портфель пуст';
    el.innerHTML = '<div class="empty">Добавь монеты ниже 👇<br><small>Также доступно через /portfolio в боте</small></div>';
    return;
  }

  const coinSymbols = keys.map(k => k.toLowerCase());
  try {
    const priceData = await backendAPI('/api/prices?coins=' + coinSymbols.join(','));
    if (!priceData || !priceData.length) throw new Error('no prices');
    const priceMap = {};
    priceData.forEach(d => {
      priceMap[d.id] = d;
      if (d.symbol) priceMap[d.symbol.toLowerCase()] = d;
    });

    let total = 0, totalPrev = 0;
    const rows = keys.map(coin => {
      const coinKey = coin.toLowerCase();
      const d = priceMap[coinKey] || priceMap[COIN_ID_MAP[coinKey]];
      const amount = parseFloat(port[coin]);
      if (!d || !d.price) return { coin, amount, value: 0, pct: 0, price: 0 };
      const value = amount * d.price;
      const pct = d.change_24h || 0;
      total += value; totalPrev += value / (1 + pct/100);
      return { coin: coin.toUpperCase(), amount, value, pct, price: d.price };
    }).sort((a,b) => b.value - a.value);

    const totalChange = totalPrev > 0 ? (total - totalPrev) / totalPrev * 100 : 0;
    document.getElementById('port-total').textContent = '$' + total.toLocaleString('en', {maximumFractionDigits:2});
    document.getElementById('port-change').innerHTML = fmtPct(totalChange) + ' за 24ч';
    el.innerHTML = rows.filter(r => r.value > 0).map(row => {
      const share = total > 0 ? row.value / total * 100 : 0;
      return `<div class="port-coin">
        <div class="port-coin-left">
          <div>
            <div style="font-weight:600">${row.coin}</div>
            <div class="port-coin-amount">${row.amount.toLocaleString('en',{maximumFractionDigits:8})} × ${fmtPrice(row.price)}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600">$${row.value.toLocaleString('en',{maximumFractionDigits:2})}</div>
          <div>${fmtPct(row.pct)}</div>
          <div class="port-share-bar" style="margin-top:4px;margin-left:auto">
            <div class="port-share-fill" style="width:${Math.min(share,100)}%"></div>
          </div>
        </div>
      </div>`;
    }).join('') || '<div class="empty">Нет данных о ценах</div>';
  } catch {
    el.innerHTML = '<div class="empty">⚠️ Ошибка загрузки цен</div>';
  }
}

async function addCoin() {

  const amount = parseFloat(document.getElementById('add-amount').value);
  if (!coin || !amount || amount <= 0) { toast('Укажи монету и количество', '#f85149'); return; }

    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({uid:USER_ID, coin, amount, action:'add'})

}

// ── CALENDAR (фильтрация по периодам) ────────────────────────────────────────
let _calEvents = [];
let _calFilter = 'week';

function _daysLeft(dateStr) {
  if (!dateStr || dateStr.length < 10) return null;
  const [y, m, d] = dateStr.slice(0,10).split('-').map(Number);
  const eventMs = Date.UTC(y, m - 1, d);
  const todayMs = Date.UTC(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  return Math.round((eventMs - todayMs) / 86400000);
}

function _renderCalEvents(events) {
  const el = document.getElementById('cal-list');
  if (!events.length) {
    el.innerHTML = '<div class="empty">Нет событий за этот период</div>';
    return;
  }
  el.innerHTML = events.map(e => {
    const date     = (e.date || '').slice(0, 10);
    const dl       = _daysLeft(date);
    const isHigh   = e.impact === 'high';
    const urgency  = isHigh ? 'impact-high' : 'impact-medium';
    const urgencyLabel = dl === 0 ? '🔴 СЕГОДНЯ'
                       : dl === 1 ? '🟠 ЗАВТРА'
                       : dl !== null && dl <= 3 ? '🟠 Скоро'
                       : isHigh ? '🔴 Важно' : '🟡 Запланировано';
    const whenParts = [];
    if (date) whenParts.push('📅 ' + date);
    if (e.time) whenParts.push(e.time);
    if (dl !== null && dl >= 0) whenParts.push(`через ${dl} дн.`);
    else if (dl !== null && dl < 0) whenParts.push('прошло');
    const when = whenParts.join(' · ');

    let metaHtml = '';
    if (e.forecast || e.previous || e.actual) {
      const parts = [];
      if (e.forecast) parts.push(`<div class="event-val"><span>Прогноз: </span>${e.forecast}</div>`);
      if (e.previous) parts.push(`<div class="event-val"><span>Пред.: </span>${e.previous}</div>`);
      if (e.actual) {
        const cls = parseFloat(e.actual) >= parseFloat(e.forecast||'0') ? 'event-actual-pos' : 'event-actual-neg';
        parts.push(`<div class="event-val"><span>Факт: </span><span class="${cls}">${e.actual}</span></div>`);
      }
      if (parts.length) metaHtml = `<div class="event-meta">${parts.join('')}</div>`;
    }
    const impactHtml = e.crypto_impact ? `<div class="event-impact-text">${e.crypto_impact}</div>` : '';

    return `<div class="event-row">
      <span class="event-impact ${urgency}">${urgencyLabel}</span>
      <div class="event-title">${e.title || '—'}</div>
      <div class="event-when">${when}</div>
      ${metaHtml}${impactHtml}
    </div>`;
  }).join('');
}

function filterCal(period, btn) {
  _calFilter = period;
  document.querySelectorAll('#cal-period-tabs .ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const now = new Date();
  const todayStr  = now.toISOString().slice(0,10);
  const tomorrowStr = new Date(now.getTime() + 86400000).toISOString().slice(0,10);
  // конец этой недели (ближайшее воскресенье)
  const weekEnd = new Date(now);
  weekEnd.setDate(now.getDate() + (7 - now.getDay() || 7));
  const weekEndStr = weekEnd.toISOString().slice(0,10);
  // конец месяца
  const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  const monthEndStr = monthEnd.toISOString().slice(0,10);

  let filtered;
  switch(period) {
    case 'today':    filtered = _calEvents.filter(e => e.date.slice(0,10) === todayStr); break;
    case 'tomorrow': filtered = _calEvents.filter(e => e.date.slice(0,10) === tomorrowStr); break;
    case 'week':     filtered = _calEvents.filter(e => e.date.slice(0,10) >= todayStr && e.date.slice(0,10) <= weekEndStr); break;
    case 'month':    filtered = _calEvents.filter(e => e.date.slice(0,10) >= todayStr && e.date.slice(0,10) <= monthEndStr); break;
    default:         filtered = _calEvents;
  }
  _renderCalEvents(filtered);
}

async function loadCalendar() {
  const el = document.getElementById('cal-list');
  el.innerHTML = '<div class="loader"><span class="spinner">⏳</span>Загружаем события...</div>';
  const events = await backendAPI('/api/calendar');
  if (!events || !events.length) {
    el.innerHTML = '<div class="empty">⚠️ Данные временно недоступны</div>';
    return;
  }
  _calEvents = events;
  // Применяем текущий фильтр (по умолчанию — эта неделя)
  const activeTab = document.querySelector('#cal-period-tabs .ptab.active');
  if (activeTab) filterCal(_calFilter, activeTab);
  else _renderCalEvents(events);
}

// ── NEWS (фильтрация по периоду и языку) ──────────────────────────────────────
let _allNews = [];
const _RU_SOURCES = new Set(['Forklog', 'BeInCrypto RU', 'Bits.Media']);

function _timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() / 1000) - ts);
  if (diff < 60)   return 'только что';
  if (diff < 3600) return `${Math.floor(diff/60)} мин назад`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ч назад`;
  return `${Math.floor(diff/86400)} дн назад`;
}

function _renderNews(news) {
  const el = document.getElementById('news-list');
  if (!news.length) { el.innerHTML = '<div class="empty">Нет новостей за этот период</div>'; return; }
  el.innerHTML = news.map((n, i) => {
    const src  = n.source ? `<span class="news-src">${n.source}</span>` : '';
    const link = n.url    ? `<a class="news-link" href="${n.url}" target="_blank">🔗 Читать</a>` : '';
    const ago  = n.pub_ts ? `<span style="color:var(--muted);font-size:11px">${_timeAgo(n.pub_ts)}</span>` : '';
    return `<div class="news-row">
      <div class="news-title">${i+1}. ${n.title || '—'}</div>
      <div class="news-meta">${src}${ago}${link}</div>
    </div>`;
  }).join('');
}

function filterNews(type, btn) {
  document.querySelectorAll('#news-period-tabs .ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const now = Date.now() / 1000;
  let filtered;
  switch(type) {
    case '3h':    filtered = _allNews.filter(n => !n.pub_ts || now - n.pub_ts <= 10800); break;
    case 'today': filtered = _allNews.filter(n => !n.pub_ts || now - n.pub_ts <= 86400); break;
    case 'ru':    filtered = _allNews.filter(n => _RU_SOURCES.has(n.source)); break;
    case 'en':    filtered = _allNews.filter(n => !_RU_SOURCES.has(n.source)); break;
    default:      filtered = _allNews;
  }
  _renderNews(filtered);
}

async function loadNews() {
  const el = document.getElementById('news-list');
  el.innerHTML = '<div class="loader"><span class="spinner">⏳</span>Загружаем новости...</div>';
  const news = await backendAPI('/api/news?limit=20');
  if (!news || !news.length) {
    el.innerHTML = '<div class="empty">⚠️ Новости временно недоступны</div>';
    return;
  }
  _allNews = news;
  const activeTab = document.querySelector('#news-period-tabs .ptab.active');
  if (activeTab) filterNews('all', activeTab);
  else _renderNews(news);
}

// ── TOP-50 (с сортировкой и поиском) ──────────────────────────────────────────
let _top50Data   = [];
let _top50Sort   = 'vol';

function fmtVol(v) {
  if (!v) return '—';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + v.toFixed(0);
}

function _renderTop50(data) {
  const el = document.getElementById('top50-list');
  if (!data.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
  el.innerHTML = data.map((t, i) => {
    const chgCls = t.change_24h >= 0 ? 'change-pos' : 'change-neg';
    return `<div class="top50-row">
      <span class="top50-rank">${i+1}</span>
      <span class="top50-sym">${t.symbol}</span>
      <span class="coin-right" style="text-align:right">
        <div style="font-weight:600;font-size:13px">${fmtPrice(t.price)}</div>
        <div><span class="${chgCls}">${t.change_24h >= 0 ? '+' : ''}${t.change_24h.toFixed(2)}%</span>
             <span class="top50-vol"> ${fmtVol(t.volume_24h)}</span></div>
      </span>
    </div>`;
  }).join('');
}

function sortTop50(by, btn) {
  _top50Sort = by;
  document.querySelectorAll('#top50-sort-tabs .ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyTop50Filter();
}

function filterTop50() { applyTop50Filter(); }

function applyTop50Filter() {
  const q = (document.getElementById('top50-search')?.value || '').toLowerCase().trim();
  let data = _top50Data.filter(t => !q || t.symbol.toLowerCase().includes(q));
  switch(_top50Sort) {
    case 'chg_desc': data.sort((a,b) => b.change_24h - a.change_24h); break;
    case 'chg_asc':  data.sort((a,b) => a.change_24h - b.change_24h); break;
    case 'price':    data.sort((a,b) => b.price - a.price); break;
    default:         data.sort((a,b) => b.volume_24h - a.volume_24h);
  }
  _renderTop50(data);
}

async function loadTop50() {
  const data = await backendAPI('/api/prices/top50');
  if (!data || !data.length) {
    document.getElementById('top50-list').innerHTML = '<div class="empty">⚠️ Недоступно</div>';
    return;
  }
  _top50Data = data;
  const upd = document.getElementById('top50-upd');
  if (upd) upd.textContent = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  applyTop50Filter();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadPrices();
loadTop50();
